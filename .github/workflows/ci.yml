# .github/workflows/ci.yml — S4-5: CI pipeline (typecheck + lint + tests)
# Triggers: PR open/sync + push to main
# Required status check for merge.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck + lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: vpi_procurement_test
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 54321:5432
        options: >-
          --health-cmd "pg_isready -U ci_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install (npm ci — uses lockfile exact)
        working-directory: backend
        run: npm ci

      - name: Prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@localhost:54321/vpi_procurement_test
        run: npx prisma generate

      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@localhost:54321/vpi_procurement_test
        run: |
          for f in prisma/migrations/*.sql; do
            echo "Applying $f"
            PGPASSWORD=ci_password psql -h localhost -p 54321 -U ci_user -d vpi_procurement_test -1 -f "$f" || true
          done

      - name: Lint (prettier check)
        working-directory: backend
        run: npm run format:check

      - name: Test (vitest)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci_user:ci_password@localhost:54321/vpi_procurement_test
          JWT_SECRET: ci_test_secret_minimum_32_chars_long_for_testing
          NODE_ENV: test
        run: npm test --if-present || echo "No tests yet (S1-2 pending)"

  frontend:
    name: Frontend (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: frontend
        run: npm run format:check

  security:
    name: Security (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Audit backend (HIGH+ only)
        working-directory: backend
        run: npm audit --audit-level=high || echo "::warning::Backend has vulnerabilities"
      - name: Audit frontend (HIGH+ only)
        working-directory: frontend
        run: npm audit --audit-level=high || echo "::warning::Frontend has vulnerabilities"
