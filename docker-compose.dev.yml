# docker-compose.dev.yml — S3-1: 1-command dev environment (risk H6 fix)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up        # start all 3 services
#   docker compose -f docker-compose.dev.yml down      # stop
#   docker compose -f docker-compose.dev.yml logs -f backend
#
# Replaces 3-terminal-tab workflow + embedded-postgres BETA (S4-1).
# pg_data persisted via named volume, uploads/ via bind mount.

services:
  postgres:
    image: postgres:18-alpine
    container_name: ibshi-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpi_procurement
      POSTGRES_USER: vpi_user
      POSTGRES_PASSWORD: VpiProcurement2026!
    ports:
      - "54321:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/prisma/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpi_user -d vpi_procurement"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:22-alpine
    container_name: ibshi-backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5005
      DATABASE_URL: postgresql://vpi_user:VpiProcurement2026%21@postgres:5432/vpi_procurement
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod_minimum_32_chars}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      LOG_LEVEL: debug
      LOG_PRETTY: "1"
    ports:
      - "5005:5005"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./backend/uploads:/app/uploads
    command: sh -c "npm install && npx prisma generate && npm run dev"

  frontend:
    image: node:22-alpine
    container_name: ibshi-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      PORT: 3001
      NEXT_PUBLIC_API_URL: http://localhost:5005
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    command: sh -c "npm install && npm run dev"

volumes:
  pg_data:
  backend_node_modules:
  frontend_node_modules:
  frontend_next_cache:
