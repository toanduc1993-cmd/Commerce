# ─────────────────────────────────────────────────────────────────────────────
# IBS Procurement — Virtual host
# HTTP → redirect HTTPS · HTTPS serve frontend + proxy /api → backend
#
# Nếu chưa có SSL cert, comment block HTTPS và dùng HTTP trực tiếp (staging only).
# ─────────────────────────────────────────────────────────────────────────────

# ─── HTTP: redirect to HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint cho load balancer
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Production: redirect all to HTTPS
    # Comment dòng này nếu chạy staging không có SSL
    return 301 https://$host$request_uri;

    # ─── STAGING MODE (no SSL) — uncomment block dưới và comment redirect ───
    # include /etc/nginx/conf.d/_routes.conf;
}

# ─── HTTPS: main app ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ─── SSL ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─── Health endpoint ────────────────────────────────────────────────────
    location = /health {
        access_log off;
        proxy_pass http://backend_upstream/health;
    }

    # ─── API routes → Backend ───────────────────────────────────────────────
    # Login có rate limit chặt hơn (backend cũng limit nhưng Nginx là hàng rào đầu)
    location = /api/v1/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/_proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/_proxy_params.conf;
        # File upload cần timeout dài + body size lớn
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Uploads tĩnh → Backend ─────────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/_proxy_params.conf;
        proxy_cache_valid 200 1h;
    }

    # ─── Next.js static assets (aggressive cache) ───────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        include /etc/nginx/conf.d/_proxy_params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Frontend (Next.js) ─────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend_upstream;
        include /etc/nginx/conf.d/_proxy_params.conf;
    }
}
