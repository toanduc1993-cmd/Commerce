# ─────────────────────────────────────────────────────────────────────────────
# IBS Procurement — Docker Compose stack
# 4 services: postgres · backend · frontend · nginx
#
# Deploy:
#   1. Copy .env.example → .env và điền giá trị thật
#   2. docker compose build
#   3. docker compose up -d
#   4. docker compose exec backend npx prisma migrate deploy
#   5. docker compose exec backend node run_seed.js   (chỉ lần đầu)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL 17 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: ibshi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ibshi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ibshi_procurement}
      # Lock down: chỉ listen trong docker network, không expose ra host
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ibshi_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    # Expose chỉ trong internal network, KHÔNG map ra host port (security)

  # ─── Backend (Express + Prisma) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ibshi_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5005
      DATABASE_URL: postgresql://${POSTGRES_USER:-ibshi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ibshi_procurement}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      TRUST_PROXY: '1'
    volumes:
      - uploads:/app/uploads
    networks:
      - ibshi_net
    # Không expose port ra host — Nginx proxy vào qua mạng nội bộ

  # ─── Frontend (Next.js 16 standalone) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time: dùng relative /api (Nginx sẽ proxy sang backend)
        NEXT_PUBLIC_API_URL: ''
    container_name: ibshi_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - ibshi_net

  # ─── Nginx reverse proxy (SSL termination + routing) ────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ibshi_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - ibshi_net

networks:
  ibshi_net:
    driver: bridge

volumes:
  pg_data:
    driver: local
  uploads:
    driver: local
  nginx_logs:
    driver: local
